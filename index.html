<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>True Spring</title>

<style>
*{box-sizing:border-box;}

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
margin:0;
background:#f5f2f1;
}

.container{
max-width:900px;
margin:auto;
padding:8px 16px 16px;
}

.header{
text-align:center;
margin-bottom:8px;
}

.logo{
display:block;
max-width:220px;
margin:0 auto 6px;
}

.header h1{
font-family:Georgia,serif;
font-weight:500;
margin:0;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;
}

.section-title{
grid-column:1/-1;
font-size:12px;
letter-spacing:.15em;
color:#6d7280;
margin-top:14px;
}

.tile{
aspect-ratio:1;
border-radius:20px;
cursor:pointer;
}

.lightbox{
position:fixed;
inset:0;
display:none;
z-index:999;
}

.lightbox.show{
display:block;
}

.lightbox-color{
position:absolute;
inset:0;
}

.close-btn{
position:absolute;
top:32px;
right:32px;
width:36px;
height:36px;
border-radius:50%;
border:none;
background:rgba(255,255,255,.22);
color:white;
font-size:22px;
display:flex;
align-items:center;
justify-content:center;
backdrop-filter:blur(6px);
-webkit-backdrop-filter:blur(6px);
cursor:pointer;
}

.controls{
position:absolute;
top:32px;
right:84px;
display:flex;
gap:8px;
}

.btn{
width:36px;
height:36px;
border-radius:50%;
border:none;
background:rgba(255,255,255,.22);
color:white;
font-size:16px;
display:flex;
align-items:center;
justify-content:center;
backdrop-filter:blur(6px);
-webkit-backdrop-filter:blur(6px);
cursor:pointer;
}

.swipe{
position:absolute;
bottom:18px;
left:50%;
transform:translateX(-50%);
color:white;
letter-spacing:.15em;
font-size:12px;
}

@media (max-width:640px){
.logo{max-width:180px;}
.grid{gap:12px;}
.tile{border-radius:18px;}

.close-btn{
top:28px;
right:28px;
}

.controls{
top:28px;
right:76px;
}
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<img class="logo" src="logo.png" alt="Shades of Hue logo">
<h1>True Spring</h1>
<div>Tap color • Swipe to browse</div>
</div>

<div id="grid" class="grid"></div>

</div>

<div id="lightbox" class="lightbox">
<div id="lightboxColor" class="lightbox-color"></div>

<button id="close" class="close-btn">×</button>

<div class="controls">
<button id="prev" class="btn">←</button>
<button id="next" class="btn">→</button>
</div>

<div class="swipe">SWIPE</div>
</div>

<script>

const groups = [

{
title:"TRUE SPRING NEUTRALS",
colors:[
"#FFF8EA",
"#F4E2C6",
"#E9CF9C",
"#D9B07C",
"#C2A362",
"#7D5B41"
]
},

{
title:"LIGHT WARM BASICS",
colors:[
"#F6E7C9",
"#F1D79E",
"#E9BE8D",
"#E7D26E",
"#BECB57",
"#9CB94C"
]
},

{
title:"PEACHES + APRICOTS",
colors:[
"#F3C0A5",
"#EDAD89",
"#E98B63",
"#E68159",
"#F2C88C",
"#E7B25D"
]
},

{
title:"CORALS + SALMONS",
colors:[
"#F36E6D",
"#EA655F",
"#E67F63",
"#E97A57",
"#E54849",
"#DF8777"
]
},

{
title:"WARM REDS",
colors:[
"#E83B44",
"#E2473E",
"#DB5B3A",
"#C95931",
"#B84A2A"
]
},

{
title:"YELLOWS",
colors:[
"#F5DB72",
"#F0C845",
"#EDB24A",
"#E8D56D",
"#D8B348"
]
},

{
title:"YELLOW GREENS",
colors:[
"#B7C84B",
"#AFC54A",
"#9FBE48",
"#8BB84B",
"#77B64E"
]
},

{
title:"GREENS",
colors:[
"#72B94E",
"#53B44B",
"#3DA63F",
"#23944F",
"#1E8F63",
"#1B8862"
]
},

{
title:"AQUAS + TURQUOISES",
colors:[
"#55BBAA",
"#49B3B4",
"#31ACAF",
"#2CA5B7",
"#2499A8",
"#1E8F9B"
]
},

{
title:"SPRING BLUES",
colors:[
"#A1BBDF",
"#839ACA",
"#6F88C4",
"#4D7AC3",
"#2B75C0"
]
},

{
title:"WARM PERIWINKLES",
colors:[
"#7E71B8",
"#6F63AD"
]
}

];

const grid=document.getElementById("grid");
const lightbox=document.getElementById("lightbox");
const lightboxColor=document.getElementById("lightboxColor");

let all=[];
let index=0;
let startX=0;

groups.forEach(group=>{

const title=document.createElement("div");
title.className="section-title";
title.textContent=group.title;
grid.appendChild(title);

group.colors.forEach(color=>{

all.push(color);

const tile=document.createElement("div");
tile.className="tile";
tile.style.background=color;

tile.onclick=()=>{
index=all.indexOf(color);
open();
};

grid.appendChild(tile);

});

});

function open(){
lightbox.classList.add("show");
render();
}

function render(){
lightboxColor.style.background=all[index];
}

function next(){
index=(index+1)%all.length;
render();
}

function prev(){
index=(index-1+all.length)%all.length;
render();
}

document.getElementById("close").onclick=()=>lightbox.classList.remove("show");
document.getElementById("next").onclick=next;
document.getElementById("prev").onclick=prev;

lightbox.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX;
});

lightbox.addEventListener("touchend",e=>{
let diff=e.changedTouches[0].clientX-startX;
if(Math.abs(diff)<40)return;
diff<0?next():prev();
});

</script>

</body>
</html>
